<section class="page-card">
  <div class="actions">
    <mat-form-field class="full-width">
      <mat-label>Recherche</mat-label>
      <input matInput (keyup)="applyFilter($any($event.target).value)" placeholder="Nom, email..." />
    </mat-form-field>
    <button mat-raised-button color="primary" routerLink="/students/new">Ajouter</button>
  </div>

  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container matColumnDef="lastName"><th mat-header-cell *matHeaderCellDef mat-sort-header>Nom</th><td mat-cell *matCellDef="let s">{{ s.lastName }}</td></ng-container>
    <ng-container matColumnDef="firstName"><th mat-header-cell *matHeaderCellDef mat-sort-header>Prénom</th><td mat-cell *matCellDef="let s">{{ s.firstName }}</td></ng-container>
    <ng-container matColumnDef="email"><th mat-header-cell *matHeaderCellDef>Email</th><td mat-cell *matCellDef="let s">{{ s.email }}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Statut</th><td mat-cell *matCellDef="let s">{{ s.status }}</td></ng-container>
    <ng-container matColumnDef="enrollmentDate"><th mat-header-cell *matHeaderCellDef mat-sort-header>Inscription</th><td mat-cell *matCellDef="let s">{{ s.enrollmentDate }}</td></ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let s" class="actions">
        <button mat-button (click)="view(s)">Voir</button>
        <button mat-button (click)="edit(s)">Éditer</button>
        <button mat-button color="warn" (click)="delete(s)">Supprimer</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  <mat-paginator [pageSize]="5" [pageSizeOptions]="[5,10,20]"></mat-paginator>
</section>
